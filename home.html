<!-- ===== HOME SECTION (Main Card + Sub Cards) ===== -->
<section id="page-home" class="page-section home-one-screen pt-1">
    <div class="home-layout-inner">
        <!-- Main Card Section (Left) -->
        <div class="home-main-card" onclick="openCurrentOutfitDetail()">
            <div id="grid-card-main" class="w-full h-full relative overflow-hidden rounded-[32px] bg-white/40 dark:bg-black/20 border border-white/60 dark:border-white/10 shadow-2xl backdrop-blur-xl group transition-all duration-500 hover:shadow-primary/20">
                <!-- Main Image (full bleed, bottom padding for bar) -->
                <div class="w-full h-full pb-28 skeleton">
                    <img id="suggest-img-0"
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        onerror="this.src='https://images.unsplash.com/photo-1445205170230-053b830c6050?auto=format&fit=crop&q=80&w=800'; this.onerror=null;"
                        alt="Suggestion" class="w-full h-full object-cover filter drop-shadow-2xl transition-transform duration-700 group-hover:scale-[1.03] opacity-0" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('skeleton')"/>
                </div>

                <!-- Decision Bottom Bar -->
                <div class="absolute bottom-4 left-4 right-4 z-20">
                    <div class="home-decision-bar">
                        <div class="flex items-start gap-2.5 min-w-0">
                            <div class="home-weather-pill">
                                <span id="suggest-weather-emoji" class="text-xl leading-none">--</span>
                                <div class="flex flex-col min-w-0">
                                    <span id="suggest-time-label" class="text-[9px] font-black uppercase tracking-widest leading-none">NOW</span>
                                    <span id="suggest-apparent-temp" class="text-[17px] font-black leading-none mt-0.5">--°</span>
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-1.5 min-w-0">
                                    <span id="suggest-judgement" class="home-judgement-chip">今日の判断を準備中</span>
                                    <span id="suggest-range" class="home-range-chip">--</span>
                                </div>
                                <h3 id="suggest-title-0" class="font-headline font-bold text-sm text-on-surface dark:text-white leading-tight truncate mt-1">--</h3>
                                <p id="suggest-desc-0" class="text-[9px] font-bold text-on-surface-variant dark:text-white/65 line-clamp-1 leading-snug mt-0.5">天気に合わせたコーデを読み込み中...</p>
                            </div>
                            <button id="refresh-outfits-btn" type="button"
                                    onclick="event.stopPropagation(); if(typeof manualRegenerateOutfits==='function') manualRegenerateOutfits();"
                                    title="コーデを再生成"
                                    class="home-icon-button">
                                <span class="material-symbols-outlined text-primary dark:text-blue-300 text-[18px]">refresh</span>
                            </button>
                            <div class="home-icon-button tap-hint" title="詳しく見る">
                                <span class="material-symbols-outlined text-primary dark:text-blue-300 text-[18px]">touch_app</span>
                            </div>
                        </div>
                        <div class="home-insight-row">
                            <p id="suggest-reason" class="home-insight-text">体感温度と天気から、理由を整理しています。</p>
                            <p id="suggest-carry" class="home-carry-text">持ち物: --</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sub Column Section (Right) -->
        <div class="home-sub-column">
            <div id="grid-card-0" onclick="selectSuggestion(0)" class="home-sub-card group relative overflow-hidden rounded-[20px] bg-white/30 dark:bg-black/20 border border-white/40 dark:border-white/10 shadow-lg backdrop-blur-md cursor-pointer transition-all duration-300 skeleton">
                <img id="grid-img-0" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-0" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('skeleton')" onerror="this.src='https://images.unsplash.com/photo-1441984908746-d44ba895ee32?auto=format&fit=crop&q=80&w=400'; this.onerror=null;" alt="NOW"/>
                <div class="absolute inset-x-2 bottom-2 p-1.5 bg-black/40 dark:bg-black/60 backdrop-blur-md border border-white/20 dark:border-white/10 rounded-xl flex items-center justify-between pointer-events-none shadow-sm opacity-0" id="grid-overlay-0">
                    <div id="grid-badge-left-0"><span class="text-[9px] font-black tracking-wider text-white/90 pl-1">--:--</span></div>
                    <div class="flex items-center gap-1.5 pr-1">
                        <span id="grid-badge-icon-0" class="text-[12px] leading-none drop-shadow-sm">--</span>
                        <div id="grid-badge-right-0"><span class="text-[12px] font-black text-white">--°</span></div>
                    </div>
                </div>
            </div>
            <div id="grid-card-1" onclick="selectSuggestion(1)" class="home-sub-card group relative overflow-hidden rounded-[20px] bg-white/30 dark:bg-black/20 border border-white/40 dark:border-white/10 shadow-lg backdrop-blur-md cursor-pointer transition-all duration-300 skeleton">
                <img id="grid-img-1" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-0" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('skeleton')" onerror="this.src='https://images.unsplash.com/photo-1441984908746-d44ba895ee32?auto=format&fit=crop&q=80&w=400'; this.onerror=null;" alt="3h"/>
                <div class="absolute inset-x-2 bottom-2 p-1.5 bg-black/40 dark:bg-black/60 backdrop-blur-md border border-white/20 dark:border-white/10 rounded-xl flex items-center justify-between pointer-events-none shadow-sm opacity-0" id="grid-overlay-1">
                    <div id="grid-badge-left-1"><span class="text-[9px] font-black tracking-wider text-white/90 pl-1">--:--</span></div>
                    <div class="flex items-center gap-1.5 pr-1">
                        <span id="grid-badge-icon-1" class="text-[12px] leading-none drop-shadow-sm">--</span>
                        <div id="grid-badge-right-1"><span class="text-[12px] font-black text-white">--°</span></div>
                    </div>
                </div>
            </div>
            <div id="grid-card-2" onclick="selectSuggestion(2)" class="home-sub-card group relative overflow-hidden rounded-[20px] bg-white/30 dark:bg-black/20 border border-white/40 dark:border-white/10 shadow-lg backdrop-blur-md cursor-pointer transition-all duration-300 skeleton">
                <img id="grid-img-2" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-0" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('skeleton')" onerror="this.src='https://images.unsplash.com/photo-1441984908746-d44ba895ee32?auto=format&fit=crop&q=80&w=400'; this.onerror=null;" alt="6h"/>
                <div class="absolute inset-x-2 bottom-2 p-1.5 bg-black/40 dark:bg-black/60 backdrop-blur-md border border-white/20 dark:border-white/10 rounded-xl flex items-center justify-between pointer-events-none shadow-sm opacity-0" id="grid-overlay-2">
                    <div id="grid-badge-left-2"><span class="text-[9px] font-black tracking-wider text-white/90 pl-1">--:--</span></div>
                    <div class="flex items-center gap-1.5 pr-1">
                        <span id="grid-badge-icon-2" class="text-[12px] leading-none drop-shadow-sm">--</span>
                        <div id="grid-badge-right-2"><span class="text-[12px] font-black text-white">--°</span></div>
                    </div>
                </div>
            </div>
            <div id="grid-card-3" onclick="selectSuggestion(3)" class="home-sub-card group relative overflow-hidden rounded-[20px] bg-white/30 dark:bg-black/20 border border-white/40 dark:border-white/10 shadow-lg backdrop-blur-md cursor-pointer transition-all duration-300 skeleton">
                <img id="grid-img-3" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-0" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('skeleton')" onerror="this.src='https://images.unsplash.com/photo-1441984908746-d44ba895ee32?auto=format&fit=crop&q=80&w=400'; this.onerror=null;" alt="12h"/>
                <div class="absolute inset-x-2 bottom-2 p-1.5 bg-black/40 dark:bg-black/60 backdrop-blur-md border border-white/20 dark:border-white/10 rounded-xl flex items-center justify-between pointer-events-none shadow-sm opacity-0" id="grid-overlay-3">
                    <div id="grid-badge-left-3"><span class="text-[9px] font-black tracking-wider text-white/90 pl-1">--:--</span></div>
                    <div class="flex items-center gap-1.5 pr-1">
                        <span id="grid-badge-icon-3" class="text-[12px] leading-none drop-shadow-sm">--</span>
                        <div id="grid-badge-right-3"><span class="text-[12px] font-black text-white">--°</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
