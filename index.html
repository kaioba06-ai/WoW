<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Wear for Weather - 気温に合わせた安心感を</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0060ad",
                        "on-primary": "#f8f8ff",
                        "secondary": "#426751",
                        "on-secondary": "#e7ffed",
                        "tertiary": "#8a4f46",
                        "on-tertiary": "#fff7f6",
                        "on-surface": "#173355",
                        "on-surface-variant": "#466084",
                        "surface-container-low": "#eff3ff",
                        "surface-container-high": "#dde9ff",
                        "surface-container-highest": "#d4e3ff",
                        "surface-container-lowest": "#ffffff/80",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "Noto Sans JP", "sans-serif"],
                        "body": ["Manrope", "Noto Sans JP", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2.5rem", "full": "9999px"},
                },
            },
        }
    </script>
    <link rel="stylesheet" href="styles.css"/>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Modular Scripts -->
    <script src="js/config.js?v=1"></script>
    <script src="js/app.js?v=6" defer></script>
    <script src="js/ui.js?v=6" defer></script>
    <script src="js/outfits.js?v=1" defer></script>
    <script src="js/weather.js?v=6" defer></script>
    <script src="js/home.js?v=5" defer></script>
    <script src="js/closet.js?v=5" defer></script>
    <script src="js/community.js?v=5" defer></script>
    <script src="js/profile.js?v=5" defer></script>
    <script src="js/scene.js?v=5" defer></script>
    <script src="js/social.js?v=5" defer></script>
</head>
<body class="loading-app overflow-x-hidden transition-colors duration-500">

<!-- 全画面ローダー -->
<div id="global-loader" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-white dark:bg-slate-950 transition-opacity duration-700">
    <div class="relative w-32 h-24 flex items-center justify-center">
        <!-- センターロゴ (WoW) - 動きを抑えたプロフェッショナルな表示 -->
        <span class="font-headline font-black text-5xl text-primary dark:text-blue-400 tracking-tighter">WoW</span>
    </div>
    <div class="mt-8 flex flex-col items-center gap-2">
        <p class="font-headline font-bold text-xs tracking-[0.3em] uppercase text-on-surface-variant dark:text-white/60">Wear for Weather</p>
        <div class="w-12 h-1 bg-black/5 dark:bg-white/10 rounded-full overflow-hidden">
            <div class="w-full h-full bg-primary dark:bg-blue-500 origin-left animate-[loadingBar_1.5s_infinite_ease-in-out]"></div>
        </div>
    </div>
</div>

<!-- 共通 TopAppBar -->
<!-- 26. スクロール追従型Stickyヘッダー -->
<header class="fixed top-0 w-full z-50 transition-all duration-300">

    <div class="bg-white/40 dark:bg-black/40 backdrop-blur-2xl border-b border-white/20 dark:border-white/10 flex items-center justify-between w-full px-6 py-3 max-w-2xl mx-auto shadow-sm">
        <!-- Weather Status Integrated (Now on Left) -->
        <div class="flex items-center gap-3 pr-4 border-r border-black/5 dark:border-white/10 overflow-hidden">
            <div class="flex items-center gap-2 shrink-0">
                <span id="weather-emoji" class="text-xl">--</span>
                <div class="flex flex-col leading-none">
                    <span id="weather-desc" class="font-bold text-[8px] dark:text-white/60 uppercase tracking-widest truncate max-w-[60px]">取得中</span>
                    <div id="temp-diff-badge" class="flex items-center gap-1 text-[8px] font-bold text-primary dark:text-blue-400" style="display:none">
                        <span id="temp-diff-text">--°C</span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-baseline gap-3 shrink-0 ml-1">
                <div class="flex items-baseline gap-1">
                    <span class="text-[9px] font-black text-red-500 uppercase tracking-tighter">MAX</span>
                    <span id="apparent-max-temp" class="font-headline font-black text-[16px] text-on-surface dark:text-white tracking-tighter leading-none">--°</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">MIN</span>
                    <span id="apparent-min-temp" class="font-headline font-black text-[16px] text-on-surface dark:text-white tracking-tighter leading-none">--°</span>
                </div>
            </div>
        </div>

        <!-- Location Selector (Now on Right) -->
        <button id="location-btn" onclick="openLocationModal()" class="flex items-center gap-1.5 relative cursor-pointer hover:opacity-80 active:scale-95 transition-all bg-transparent border-none p-0 shrink-0 ml-auto">
            <div class="flex flex-col items-end max-w-[120px]">
                <h1 id="location-text" class="font-headline font-bold text-[13px] tracking-tight overflow-hidden text-on-surface dark:text-white text-right truncate w-full">取得中...</h1>
            </div>
            <div class="relative flex items-center justify-center">
                <span id="location-ping" class="absolute w-4 h-4 bg-primary/40 dark:bg-blue-400/50 rounded-full animate-ping z-0"></span>
                <span class="material-symbols-outlined text-primary dark:text-blue-400 font-bold relative z-10 text-[20px]" data-icon="location_on">location_on</span>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant dark:text-white/40 text-[14px]">expand_more</span>
        </button>
    </div>
</header>

<main class="max-w-2xl mx-auto pt-[64px] relative">
    <!-- home-container -->
    <div id="home-container" class="page-container active-page"></div>
    <div id="weekly-container" class="page-container hidden-page"></div>
    <div id="closet-container" class="page-container hidden-page"></div>
    <div id="discover-container" class="page-container hidden-page"></div>
    <div id="profile-container" class="page-container hidden-page"></div>
</main>
    <!-- 7. iOSセーフエリアへの対応 -->
    <nav class="fixed bottom-0 left-0 w-full z-[9999] flex justify-around items-center px-4 pb-[calc(1rem+env(safe-area-inset-bottom))] pt-2 bg-white/40 dark:bg-slate-900/60 backdrop-blur-2xl rounded-t-[1.5rem] shadow-[0_-12px_40px_rgba(0,0,0,0.1)] border-t border-white/30 dark:border-white/10 transition-colors h-[3.5rem]">
        <button id="nav-home" type="button" onclick="switchTab('home', this)" class="nav-item flex-1 flex flex-col items-center justify-center text-on-surface-variant dark:text-white/60 transition-all hover:text-primary dark:hover:text-blue-400 rounded-xl h-full text-center">
            <span class="material-symbols-outlined text-[20px]">wb_sunny</span>
            <span class="font-bold text-[7px] tracking-[0.2em] uppercase mt-1">Today</span>
        </button>
        <button id="nav-weekly" type="button" onclick="switchTab('weekly', this)" class="nav-item flex-1 flex flex-col items-center justify-center text-on-surface-variant dark:text-white/60 transition-all hover:text-primary dark:hover:text-blue-400 rounded-xl h-full text-center">
            <span class="material-symbols-outlined text-[20px]">date_range</span>
            <span class="font-bold text-[7px] tracking-[0.2em] uppercase mt-1">Weekly</span>
        </button>
        <button id="nav-closet" type="button" onclick="switchTab('closet', this)" class="nav-item flex-1 flex flex-col items-center justify-center text-on-surface-variant dark:text-white/60 transition-all hover:text-primary dark:hover:text-blue-400 rounded-xl h-full text-center">
            <span class="material-symbols-outlined text-[20px]">checkroom</span>
            <span class="font-bold text-[7px] tracking-[0.2em] uppercase mt-1">Closet</span>
        </button>
        <button id="nav-discover" type="button" onclick="switchTab('discover', this)" class="nav-item flex-1 flex flex-col items-center justify-center text-on-surface-variant dark:text-white/60 transition-all hover:text-primary dark:hover:text-blue-400 rounded-xl h-full text-center">
            <span class="material-symbols-outlined text-[20px]">explore</span>
            <span class="font-bold text-[7px] tracking-[0.2em] uppercase mt-1">Discover</span>
        </button>
        <button id="nav-profile" type="button" onclick="switchTab('profile', this)" class="nav-item flex-1 flex flex-col items-center justify-center text-on-surface-variant dark:text-white/60 transition-all hover:text-primary dark:hover:text-blue-400 rounded-xl h-full text-center">
            <span class="material-symbols-outlined text-[20px]">person</span>
            <span class="font-bold text-[7px] tracking-[0.2em] uppercase mt-1">Profile</span>
        </button>
    </nav>

    <!-- subpage-container -->
    <div id="subpage-container"></div>

    <!-- modals-container -->
    <div id="modals-container"></div>

    <!-- Supabase Client Initialization -->
    <script>
        const SUPABASE_URL = 'https://bjqfmfiqzmwezlkjbgfn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Olj5M55D1DnHjua7UZkHHA_u49S6Z2O';
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initializeAuth() {
            const { data, error } = await supabase.auth.getSession();
            if (error) { console.error('Session error:', error); return; }
            if (data.session) {
                console.log('User logged in:', data.session.user.email);
            } else {
                console.log('No session found');
            }
        }
        window.addEventListener('load', initializeAuth);
    </script>
</body>
</html>
