<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>WoW - ログイン</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="js/config.js?v=1"></script>
    <script src="js/utils.js?v=1"></script>
    <link rel="stylesheet" href="styles.css"/>
    <style>
        body {
            background-image: url('背景/weather_sunny.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 250, 255, 0.75);
            backdrop-filter: blur(10px);
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-dvh px-4 py-10">

<div class="w-full max-w-sm mx-auto space-y-6">

    <!-- ロゴ & キャッチコピー -->
    <div class="text-center space-y-2 fade-up">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-[20px] shadow-lg mb-2 overflow-hidden">
            <img src="icon.png" alt="WoW icon" class="w-full h-full object-cover"/>
        </div>
        <h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">WoW</h1>
        <p class="text-on-surface-variant text-sm font-medium">シーンに合わせた安心感を</p>
    </div>

    <!-- カード -->
    <div class="bg-white/50 backdrop-blur-xl rounded-[28px] border border-white/60 shadow-2xl p-7 space-y-5 fade-up-2">

        <h2 class="font-headline font-bold text-xl text-on-surface text-center">ログイン</h2>

        <!-- エラーバナー -->
        <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-2.5 text-xs font-semibold flex items-center gap-2">
            <span class="material-symbols-outlined text-base">error</span>
            <span id="error-banner-text">メールアドレスまたはパスワードが正しくありません。</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" novalidate class="space-y-4">
            <!-- メール -->
            <div class="space-y-1">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
                    <input
                        id="email"
                        type="email"
                        placeholder="メールアドレス"
                        class="input-field"
                        autocomplete="email"
                        inputmode="email"
                    />
                </div>
                <p class="error-msg" id="email-err">有効なメールアドレスを入力してください。</p>
            </div>

            <!-- パスワード -->
            <div class="space-y-1">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
                    <input
                        id="password"
                        type="password"
                        placeholder="パスワード"
                        class="input-field"
                        autocomplete="current-password"
                    />
                    <button type="button" id="pw-toggle" onclick="togglePassword('password','pw-toggle')" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                    </button>
                </div>
                <p class="error-msg" id="password-err">パスワードを入力してください。</p>
            </div>

            <!-- パスワードを忘れた -->
            <div class="text-right">
                <a href="#" class="text-primary font-semibold text-xs hover:underline">パスワードをお忘れですか？</a>
            </div>

            <!-- ログインボタン -->
            <button type="submit" id="login-btn" class="btn-primary flex items-center justify-center gap-2">
                <span id="login-btn-text">ログイン</span>
                <span id="login-spinner" class="hidden">
                    <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                </span>
            </button>
        </form>

        <!-- 区切り -->
        <div class="flex items-center gap-3">
            <div class="flex-1 h-px bg-black/10"></div>
            <span class="text-on-surface-variant text-xs font-semibold">または</span>
            <div class="flex-1 h-px bg-black/10"></div>
        </div>

        <!-- ソーシャルログイン -->
        <div class="space-y-2.5">
            <button class="social-btn" onclick="socialLogin('google')">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Googleでログイン
            </button>
        </div>
    </div>

    <!-- アカウント作成へ -->
    <p class="text-center text-sm text-on-surface-variant font-medium fade-up-3">
        アカウントをお持ちでない方は
        <a href="register.html" class="text-primary font-bold hover:underline ml-1">新規登録</a>
    </p>

    <!-- 利用規約 -->
    <p class="text-center text-[10px] text-on-surface-variant/70 fade-up-4 px-4 leading-relaxed">
        ログインすることで、<a href="#" class="underline">利用規約</a>および<a href="#" class="underline">プライバシーポリシー</a>に同意したものとみなされます。
    </p>

</div>

<script>

    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        let valid = true;

        const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!emailValid) {
            showError('email-err', true);
            shakeField('email');
            valid = false;
        } else {
            showError('email-err', false);
        }

        if (!password) {
            showError('password-err', true);
            shakeField('password');
            valid = false;
        } else {
            showError('password-err', false);
        }

        if (!valid) return;

        // ローディング状態
        const btn = document.getElementById('login-btn');
        document.getElementById('login-btn-text').textContent = 'ログイン中...';
        document.getElementById('login-spinner').classList.remove('hidden');
        btn.disabled = true;

        // 認証処理（仮: 2秒後にホームへ遷移）
        setTimeout(() => {
            // 認証成功 → index.html へ
            window.location.href = 'index.html';
            // 認証失敗の場合は以下を呼ぶ:
            // showLoginError('メールアドレスまたはパスワードが正しくありません。');
        }, 1500);
    }

    function showLoginError(msg) {
        const banner = document.getElementById('error-banner');
        document.getElementById('error-banner-text').textContent = msg;
        banner.classList.remove('hidden');
        banner.style.display = 'flex';
        document.getElementById('login-btn-text').textContent = 'ログイン';
        document.getElementById('login-spinner').classList.add('hidden');
        document.getElementById('login-btn').disabled = false;
    }

    function socialLogin(provider) {
        console.log('Social login:', provider);
        // ソーシャル認証処理をここに実装
    }
</script>
</body>
</html>
