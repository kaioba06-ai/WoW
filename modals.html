<!-- ===== MODALS & OVERLAYS (Dynamically Loaded) ===== -->

<!-- 1. コーデ詳細ボトムシート (Outfit Detail) -->
<div id="outfit-detail-overlay" onclick="closeOutfitDetail()" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[10000] transition-opacity duration-500 opacity-0"></div>
<div id="outfit-detail-modal" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl z-[10001] transition-all duration-500 transform translate-y-full">
    <div class="bg-white dark:bg-slate-900 rounded-t-[3rem] shadow-2xl flex flex-col max-h-[92vh] border-t border-white/20">
        <!-- Handle -->
        <div class="flex justify-center pt-4 pb-2 shrink-0">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-slate-700 rounded-full"></div>
        </div>

        <!-- Scrollable content -->
        <div id="outfit-detail-scroll-container" class="overflow-y-auto no-scrollbar">

            <!-- ── Unified Info Card (1 row) ── -->
            <div class="px-6 pt-3">
                <div class="flex items-center gap-3 bg-black/5 dark:bg-white/[0.07] rounded-2xl border border-black/8 dark:border-white/10 px-4 py-3.5">

                    <!-- Left: Outfit info -->
                    <div class="flex-1 min-w-0">
                        <p class="text-[7px] font-black text-primary dark:text-blue-400 uppercase tracking-[0.25em] leading-none mb-1">Recommended Look</p>
                        <h2 id="detail-title" class="font-headline font-black text-base text-on-surface dark:text-white leading-tight truncate">--</h2>
                        <p id="detail-desc" class="text-[9px] font-bold text-on-surface-variant dark:text-white/60 leading-snug line-clamp-2 mt-0.5"></p>
                    </div>

                    <!-- Divider -->
                    <div class="w-px self-stretch bg-black/8 dark:bg-white/10 my-0.5 shrink-0"></div>

                    <!-- Right: Weather (Details) - Larger and more prominent -->
                    <div class="flex flex-col items-end gap-2.5 shrink-0 pl-2">
                        <!-- Main Weather -->
                        <div class="flex items-center gap-2">
                            <span id="detail-weather-desc" class="text-[13px] font-black text-on-surface dark:text-white uppercase tracking-widest leading-none">--</span>
                            <span id="detail-weather-emoji" class="text-[32px] leading-none drop-shadow-md">--</span>
                        </div>
                        
                        <!-- Mini Detail Cards -->
                        <div class="flex items-center justify-end gap-2">
                            
                            <!-- Time Card -->
                            <div class="flex flex-col items-center justify-center bg-black/5 dark:bg-white/10 px-2.5 py-1.5 rounded-xl min-w-[44px]">
                                <span class="text-[6px] font-black text-on-surface/50 dark:text-white/40 uppercase tracking-[0.2em] mb-0.5">Time</span>
                                <span id="detail-time-label" class="text-[11px] font-black text-on-surface dark:text-white leading-none">NOW</span>
                            </div>

                            <!-- Temp Card -->
                            <div class="flex flex-col items-center justify-center bg-primary/10 dark:bg-blue-500/15 border border-primary/10 dark:border-blue-500/20 px-2.5 py-1.5 rounded-xl min-w-[44px] shadow-sm">
                                <span class="text-[6px] font-black text-primary/60 dark:text-blue-300/60 uppercase tracking-[0.2em] mb-0.5">Temp</span>
                                <span id="detail-weather-temp" class="text-[11px] font-black text-primary dark:text-blue-200 leading-none">--°</span>
                            </div>

                            <!-- Precip Card -->
                            <div class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/40 border border-blue-200 dark:border-blue-700/50 px-2.5 py-1.5 rounded-xl min-w-[44px] shadow-sm">
                                <span class="text-[6px] font-black text-blue-500/60 dark:text-blue-300/60 uppercase tracking-[0.2em] mb-0.5">Precip</span>
                                <div class="flex items-center gap-0.5">
                                    <span class="text-[8px] leading-none drop-shadow-sm">💧</span>
                                    <span id="detail-weather-precip" class="text-[11px] font-black text-blue-800 dark:text-blue-100 leading-none">0%</span>
                                </div>
                            </div>
                            
                        </div>
                    </div>

                </div>
            </div>

            <!-- ── Items in this look ── -->
            <div class="px-6 pt-4 pb-2">
                <p class="text-[8px] font-black text-on-surface/50 dark:text-white/40 uppercase tracking-[0.3em] mb-3">Items in this look</p>
                <div id="detail-items-grid" class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                    <!-- Dynamic -->
                </div>
            </div>

            <!-- ── Hero Image (bottom) ── -->
            <div class="px-6 pt-2 pb-2">
                <div class="relative rounded-[2.5rem] overflow-hidden aspect-[4/5] shadow-2xl group">
                    <img id="detail-hero-img" src="" alt="Detail" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"/>
                </div>
            </div>

            <!-- ── Actions ── -->
            <div class="px-6 pb-10 pt-2 flex gap-4">
                <button onclick="closeOutfitDetail()" class="flex-1 bg-gray-100 dark:bg-slate-800 py-4 rounded-2xl font-bold text-sm dark:text-white active:scale-95 transition-transform">Close</button>
                <button onclick="shareOutfit()" class="flex-1 bg-primary text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-lg">share</span>Share
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 2. 地域選択ダイアログ (Location Selector) -->
<div id="location-modal-overlay" onclick="closeLocationModal()" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[10000] transition-opacity duration-300 opacity-0"></div>
<div id="location-modal" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[95%] max-w-md z-[10001] bg-white dark:bg-slate-950 rounded-[3rem] shadow-2xl overflow-hidden border border-white/20 transition-all duration-300 transform translate-y-full">
    <div class="p-8 space-y-6 flex flex-col max-h-[85vh]">
        <div class="text-center space-y-2 flex-shrink-0">
            <h3 class="font-headline font-black text-2xl dark:text-white">地域を選択</h3>
            <p class="text-[10px] text-on-surface-variant dark:text-white/50 font-bold uppercase tracking-widest">お住まいの地域に合わせて最適な情報を提案します</p>
        </div>

        <!-- 検索バー -->
        <div class="relative flex-shrink-0">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/40 dark:text-white/20">search</span>
            <input id="location-search" type="text" placeholder="都道府県や市区町村で検索..." oninput="filterLocations(this.value)" class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-white/5 rounded-2xl border-none text-sm font-bold dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20 transition-all outline-none"/>
        </div>

        <!-- リストエリア -->
        <div id="location-list" class="flex-1 overflow-y-auto no-scrollbar space-y-1 pr-1">
            <!-- JSで動的に生成 -->
        </div>

        <!-- アクション -->
        <div class="pt-4 border-t border-black/5 dark:border-white/5 flex flex-col gap-3 flex-shrink-0">
            <button onclick="selectCurrentLocation()" class="w-full py-4 bg-primary text-white font-black text-sm rounded-2xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-[20px]">my_location</span>
                現在地を使用する
            </button>
            <button onclick="closeLocationModal()" class="w-full py-3 text-on-surface-variant dark:text-white/50 text-[11px] font-bold uppercase tracking-[0.2em] hover:opacity-70 transition-opacity">
                キャンセル
            </button>
        </div>
    </div>
</div>

<!-- 3. オフライン通知 (Offline Modal) -->
<div id="offline-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[20000] flex flex-col items-center justify-center px-10 text-center text-white">
    <div class="bg-red-500 p-6 rounded-full mb-6 animate-bounce shadow-2xl">
        <span class="material-symbols-outlined text-5xl">wifi_off</span>
    </div>
    <h2 class="font-headline font-black text-2xl mb-2">ネットワークに接続できません</h2>
    <p class="text-sm font-bold opacity-70 mb-8">お使いのデバイスがオフラインのようです。<br>接続を確認してください。</p>
    <button onclick="location.reload()" class="px-8 py-3 bg-white text-red-500 font-black rounded-full shadow-xl active:scale-95 transition-transform">
        再試行
    </button>
</div>

<!-- 4. チュートリアルモーダル (Tutorial Modal) -->
<div id="tutorial-modal" class="hidden fixed inset-0 bg-primary/95 z-[30000] flex flex-col items-center justify-center p-10 text-center text-white backdrop-blur-xl transition-opacity duration-500">
    <div class="w-24 h-24 bg-white/20 rounded-[2rem] flex items-center justify-center mb-8 animate-pulse">
        <span class="material-symbols-outlined text-5xl">auto_awesome</span>
    </div>
    <h2 class="font-headline font-black text-3xl mb-4">Wear for Weather へようこそ</h2>
    <p class="text-sm font-bold opacity-80 mb-12 leading-relaxed">
        気温に合わせた最適なコーディネートを提案する、<br>
        あなただけのファッションコンシェルジュです。
    </p>
    <div class="space-y-4 w-full max-w-xs">
        <button onclick="document.getElementById('tutorial-modal').style.display='none'" class="w-full py-4 bg-white text-primary font-black rounded-2xl shadow-2xl active:scale-95 transition-transform">
            はじめる
        </button>
    </div>
</div>
