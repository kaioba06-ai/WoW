    <section id="page-weekly" class="page-section hidden-section pb-32 relative">

        <!-- ===== Main + Sub Layout (HomeページのUIに統一) ===== -->
        <div class="home-layout-inner">
            <!-- Main Card (Left, large) -->
            <div class="home-main-card">
                <div id="weekly-main-card" class="w-full h-full relative overflow-hidden rounded-[32px] bg-white/40 dark:bg-black/20 border border-white/60 dark:border-white/10 shadow-2xl backdrop-blur-xl transition-all duration-500 skeleton">
                    <!-- 背景画像 -->
                    <img id="weekly-main-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        class="w-full h-full object-cover opacity-0"
                        onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('skeleton')"
                        onerror="this.src='https://images.unsplash.com/photo-1445205170230-053b830c6050?auto=format&fit=crop&q=80&w=800'; this.onerror=null;"
                        alt="Weekly Outfit"/>

                    <!-- 下部の統合インフォバー -->
                    <div class="absolute bottom-4 left-4 right-4 z-20">
                        <div class="flex items-center gap-2.5 bg-white/60 dark:bg-black/55 backdrop-blur-xl px-4 py-3 rounded-2xl border border-white/60 dark:border-white/10 shadow-lg">
                            <!-- 天気アイコン -->
                            <span id="weekly-main-emoji" class="material-symbols-outlined text-xl leading-none shrink-0 text-orange-400">cloud</span>
                            <span class="w-px h-5 bg-black/15 dark:bg-white/15 shrink-0"></span>
                            <!-- 日付 + 気温 -->
                            <div class="flex flex-col shrink-0">
                                <span id="weekly-main-date" class="text-[9px] font-black uppercase tracking-widest text-on-surface dark:text-white leading-none">--</span>
                                <div class="flex items-baseline mt-0.5">
                                    <span id="weekly-main-temp" class="text-[16px] font-black text-primary dark:text-blue-300 leading-none">--°</span>
                                    <span id="weekly-main-temp-min" class="text-[10px] font-bold text-on-surface-variant/60 dark:text-white/40 ml-1">/ --°</span>
                                </div>
                            </div>
                            <span class="w-px h-5 bg-black/15 dark:bg-white/15 shrink-0"></span>
                            <!-- 提案 -->
                            <div class="flex-1 min-w-0">
                                <p class="text-[7px] font-black text-primary dark:text-blue-400 uppercase tracking-[0.25em] leading-none mb-0.5">Suggestion</p>
                                <h3 id="weekly-main-suggestion" class="font-headline font-bold text-sm text-on-surface dark:text-white leading-tight truncate">--</h3>
                                <p id="weekly-main-tip" class="text-[8px] font-bold text-on-surface-variant dark:text-white/55 line-clamp-1 leading-snug mt-0.5">--</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sub Column (Right, 6 day thumbnails) -->
            <div id="weekly-sub-column" class="home-sub-column">
                <!-- 動的生成（明日〜6日後）-->
                <div class="home-sub-card skeleton" style="min-height: 80px;"></div>
                <div class="home-sub-card skeleton" style="min-height: 80px;"></div>
                <div class="home-sub-card skeleton" style="min-height: 80px;"></div>
                <div class="home-sub-card skeleton" style="min-height: 80px;"></div>
                <div class="home-sub-card skeleton" style="min-height: 80px;"></div>
                <div class="home-sub-card skeleton" style="min-height: 80px;"></div>
            </div>
        </div>
    </section>
